<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="100%" height="100%" fill="#0c1324"/>

  <!-- Vertical divider -->
  <line x1="960" y1="80" x2="960" y2="1000" stroke="#3d494c" stroke-width="1" stroke-dasharray="8 4">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze"/>
  </line>

  <!-- LEFT SIDE: HTML Code -->
  <g transform="translate(60, 80)">
    <text x="0" y="0" fill="#4cd7f6" font-family="ui-monospace, monospace" font-size="14" font-weight="600">
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.1s" fill="freeze"/>
      &lt;!-- HTML Composition --&gt;
    </text>

    <text x="0" y="40" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;div</tspan> <tspan fill="#82aaff">data-start</tspan>=<tspan fill="#c3e88d">"0"</tspan> <tspan fill="#82aaff">data-duration</tspan>=<tspan fill="#c3e88d">"5.23"</tspan><tspan fill="#c792ea">&gt;</tspan>
    </text>
    <text x="20" y="70" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;video</tspan> <tspan fill="#82aaff">src</tspan>=<tspan fill="#c3e88d">"assets/intro.mp4"</tspan> <tspan fill="#ff5370">autoplay</tspan> <tspan fill="#ff5370">muted</tspan> <tspan fill="#c792ea">/&gt;</tspan>
    </text>
    <text x="0" y="100" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;/div&gt;</tspan>
    </text>

    <text x="0" y="150" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;div</tspan> <tspan fill="#82aaff">data-start</tspan>=<tspan fill="#c3e88d">"5.23"</tspan> <tspan fill="#82aaff">data-duration</tspan>=<tspan fill="#c3e88d">"10.00"</tspan><tspan fill="#c792ea">&gt;</tspan>
    </text>
    <text x="20" y="180" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;video</tspan> <tspan fill="#82aaff">src</tspan>=<tspan fill="#c3e88d">"assets/feature.mp4"</tspan> <tspan fill="#ff5370">autoplay</tspan> <tspan fill="#ff5370">muted</tspan> <tspan fill="#c792ea">/&gt;</tspan>
    </text>
    <text x="0" y="210" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="1.9s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;/div&gt;</tspan>
    </text>

    <text x="0" y="260" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;div</tspan> <tspan fill="#82aaff">data-start</tspan>=<tspan fill="#c3e88d">"15.23"</tspan> <tspan fill="#82aaff">data-duration</tspan>=<tspan fill="#c3e88d">"4.10"</tspan><tspan fill="#c792ea">&gt;</tspan>
    </text>
    <text x="20" y="290" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;video</tspan> <tspan fill="#82aaff">src</tspan>=<tspan fill="#c3e88d">"assets/outro.mp4"</tspan> <tspan fill="#ff5370">autoplay</tspan> <tspan fill="#ff5370">muted</tspan> <tspan fill="#c792ea">/&gt;</tspan>
    </text>
    <text x="0" y="320" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.1s" fill="freeze"/>
      <tspan fill="#c792ea">&lt;/div&gt;</tspan>
    </text>
  </g>

  <!-- RIGHT SIDE: Hyperframes Player -->
  <g transform="translate(1000, 80)">
    <!-- Player Window -->
    <rect x="0" y="0" width="860" height="480" rx="8" fill="#0f172a" stroke="#3d494c" stroke-width="1.5"/>
    <rect x="0" y="0" width="860" height="36" rx="8" fill="#151b2d"/>
    <text x="430" y="24" fill="#869397" font-family="ui-monospace, monospace" font-size="12" text-anchor="middle">Hyperframes Player — 1920×1080 @ 60fps</text>

    <!-- Video placeholder 1 (intro) -->
    <rect x="20" y="60" width="820" height="120" rx="4" fill="#1a2744" stroke="#4cd7f6" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.3s" fill="freeze"/>
    </rect>
    <text x="430" y="125" fill="#4cd7f6" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze"/>
      ▶ assets/intro.mp4 (5.23s)
    </text>

    <!-- Video placeholder 2 (feature) -->
    <rect x="20" y="200" width="820" height="120" rx="4" fill="#1a2744" stroke="#4cd7f6" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.3s" fill="freeze"/>
    </rect>
    <text x="430" y="265" fill="#4cd7f6" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.3s" fill="freeze"/>
      ▶ assets/feature.mp4 (10.00s)
    </text>

    <!-- Video placeholder 3 (outro) -->
    <rect x="20" y="340" width="820" height="120" rx="4" fill="#1a2744" stroke="#4cd7f6" stroke-width="2" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.3s" fill="freeze"/>
    </rect>
    <text x="430" y="405" fill="#4cd7f6" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.3s" fill="freeze"/>
      ▶ assets/outro.mp4 (4.10s)
    </text>

    <!-- Timeline bar -->
    <rect x="20" y="460" width="820" height="4" rx="2" fill="#3d494c"/>
    <rect x="20" y="458" width="200" height="8" rx="4" fill="#4cd7f6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.3s" fill="freeze"/>
    </rect>
    <rect x="230" y="458" width="380" height="8" rx="4" fill="#c3e88d" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.7s" dur="0.3s" fill="freeze"/>
    </rect>
    <rect x="620" y="458" width="156" height="8" rx="4" fill="#c792ea" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.4s" dur="0.3s" fill="freeze"/>
    </rect>
  </g>

  <!-- Flash effect -->
  <rect width="100%" height="100%" fill="#ffffff" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0" dur="0.4s" begin="3.2s" fill="freeze"/>
  </rect>

  <!-- Final text overlay -->
  <g transform="translate(960, 540)" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.5s" fill="freeze"/>
    <text x="0" y="0" fill="#4cd7f6" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="48" font-weight="800" letter-spacing="0.05em">
      ZERO GUESSWORK
    </text>
    <text x="0" y="60" fill="#8a9aa8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="500">
      ZERO BROKEN TIMELINES
    </text>
  </g>
</svg>