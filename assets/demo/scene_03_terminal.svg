<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="terminal-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24" result="blur"/>
      <feOffset in="blur" dx="0" dy="24" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.6" result="offsetColor"/>
      <feComposite in="offsetColor" in2="offsetBlur" operator="in" result="offsetShadow"/>
      <feMerge>
        <feMergeNode in="offsetShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyan-glow-strong">
      <feGaussianBlur in="SourceAlpha" stdDeviation="15" result="blur"/>
      <feOffset in="blur" dx="0" dy="0" result="offsetBlur"/>
      <feFlood flood-color="#4cd7f6" flood-opacity="0.3" result="glowColor"/>
      <feComposite in="glowColor" in2="offsetBlur" operator="in" result="glowShadow"/>
      <feMerge>
        <feMergeNode in="glowShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0c1324"/>

  <!-- Terminal Window -->
  <g transform="translate(260, 140)" filter="url(#terminal-shadow)">
    <rect width="1400" height="800" rx="12" fill="#0f172a" fill-opacity="0.9" stroke="#3d494c" stroke-width="1.5"/>

    <!-- Header -->
    <path d="M 0 12 C 0 5.373 5.373 0 12 0 L 1388 0 C 1394.627 0 1400 5.373 1400 12 L 1400 48 L 0 48 L 0 12 Z" fill="#151b2d"/>
    <line x1="0" y1="48" x2="1400" y2="48" stroke="#3d494c" stroke-width="1"/>

    <!-- Window Controls -->
    <circle cx="24" cy="24" r="6" fill="#ffb4ab"/>
    <circle cx="44" cy="24" r="6" fill="#e1e0ff"/>
    <circle cx="64" cy="24" r="6" fill="#4edea3"/>

    <text x="700" y="28" fill="#869397" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle" font-weight="500">
      &gt;_ assetflow-agent — zsh
    </text>

    <!-- Terminal Content -->
    <g transform="translate(32, 80)" font-family="ui-monospace, monospace" font-size="18">

      <!-- Command 1 -->
      <text x="0" y="0" fill="#4cd7f6" font-weight="600">
        <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.1s" fill="freeze" calcMode="discrete"/>
        $ node scripts/list_local_assets.js
      </text>
      <text x="0" y="28" fill="#8a9aa8">
        <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.1s" fill="freeze"/>
        [ "raw_demo.mp4", "loom_2024.mp4", "logo.png" ]
      </text>
      <g transform="translate(0, 56)">
        <rect x="0" y="-14" width="20" height="20" rx="3" fill="#4edea3">
          <animate attributeName="opacity" from="0" to="1" begin="1.3s" dur="0.2s" fill="freeze"/>
          <animateTransform attributeName="transform" type="scale" from="0 0" to="1 1" begin="1.3s" dur="0.2s" fill="freeze" additive="sum"/>
        </rect>
        <path d="M 5 2 L 8 6 L 14 -2" fill="none" stroke="#003824" stroke-width="2" stroke-linecap="round">
          <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.1s" fill="freeze"/>
        </path>
        <text x="28" y="0" fill="#4edea3" font-weight="600">
          <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.1s" fill="freeze"/>
          FOUND 3 ASSETS
        </text>
      </g>

      <!-- Command 2 -->
      <text x="0" y="100" fill="#4cd7f6" font-weight="600">
        <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.1s" fill="freeze"/>
        $ node scripts/generate_avatar.js "Welcome to AssetFlow!" intro.mp4
      </text>
      <text x="0" y="128" fill="#8a9aa8">
        <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.1s" fill="freeze"/>
        [AssetFlow] Generating HeyGen Avatar video...
      </text>
      <text x="0" y="156" fill="#8a9aa8">
        <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.1s" fill="freeze"/>
        [AssetFlow] Polling for completion... Done.
      </text>
      <g transform="translate(0, 184)">
        <rect x="0" y="-14" width="20" height="20" rx="3" fill="#4edea3">
          <animate attributeName="opacity" from="0" to="1" begin="3.3s" dur="0.2s" fill="freeze"/>
        </rect>
        <path d="M 5 2 L 8 6 L 14 -2" fill="none" stroke="#003824" stroke-width="2" stroke-linecap="round">
          <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.1s" fill="freeze"/>
        </path>
        <text x="28" y="0" fill="#4edea3" font-weight="600">
          <animate attributeName="opacity" from="0" to="1" begin="3.4s" dur="0.1s" fill="freeze"/>
          SUCCESS: Avatar video saved.
        </text>
      </g>

      <!-- Command 3 -->
      <text x="0" y="228" fill="#4cd7f6" font-weight="600">
        <animate attributeName="opacity" from="0" to="1" begin="4.0s" dur="0.1s" fill="freeze"/>
        $ node scripts/get_media_duration.js intro.mp4
      </text>
      <text x="0" y="256" fill="#4cd7f6" font-weight="800" font-size="24">
        <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.1s" fill="freeze"/>
        5.23
      </text>
      <g transform="translate(0, 284)">
        <rect x="0" y="-14" width="20" height="20" rx="3" fill="#4edea3">
          <animate attributeName="opacity" from="0" to="1" begin="4.8s" dur="0.2s" fill="freeze"/>
        </rect>
        <path d="M 5 2 L 8 6 L 14 -2" fill="none" stroke="#003824" stroke-width="2" stroke-linecap="round">
          <animate attributeName="opacity" from="0" to="1" begin="4.9s" dur="0.1s" fill="freeze"/>
        </path>
        <text x="28" y="0" fill="#4edea3" font-weight="600">
          <animate attributeName="opacity" from="0" to="1" begin="4.9s" dur="0.1s" fill="freeze"/>
          DURATION CONFIRMED
        </text>
      </g>

      <!-- Blinking cursor -->
      <rect x="0" y="320" width="12" height="22" fill="#4cd7f6">
        <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>