<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="100%" height="100%" fill="#0c1324"/>

  <!-- Gallery Title -->
  <text x="960" y="120" fill="#4cd7f6" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" text-anchor="middle">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.3s" fill="freeze"/>
    Community Showcase
  </text>
  <text x="960" y="160" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="16" text-anchor="middle">
    <animate attributeName="opacity" from="0" to="1" begin="0.4s" dur="0.3s" fill="freeze"/>
    Browse · Copy · Paste · Execute
  </text>

  <!-- Card 1: Avatar Generator -->
  <g transform="translate(160, 260)" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="400 260" to="160 260" begin="0.6s" dur="0.4s" fill="freeze" calcMode="easeOut"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.3s" fill="freeze"/>

    <rect width="320" height="400" rx="12" fill="#0f172a" stroke="#3d494c" stroke-width="1.5"/>
    <rect x="16" y="16" width="80" height="28" rx="6" fill="#4cd7f6" fill-opacity="0.15" stroke="#4cd7f6" stroke-width="1"/>
    <text x="56" y="36" fill="#4cd7f6" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">HEYGEN</text>

    <text x="16" y="80" fill="#dce1fb" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700">AI Presenter</text>
    <text x="16" y="110" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="13">generate_avatar.js</text>

    <rect x="16" y="340" width="288" height="44" rx="8" fill="#4cd7f6" fill-opacity="0.1" stroke="#4cd7f6" stroke-width="1.5"/>
    <text x="160" y="368" fill="#4cd7f6" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">Copy Agent Prompt</text>
  </g>

  <!-- Card 2: Voiceover -->
  <g transform="translate(520, 260)" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="760 260" to="520 260" begin="0.9s" dur="0.4s" fill="freeze" calcMode="easeOut"/>
    <animate attributeName="opacity" from="0" to="1" begin="0.9s" dur="0.3s" fill="freeze"/>

    <rect width="320" height="400" rx="12" fill="#0f172a" stroke="#3d494c" stroke-width="1.5"/>
    <rect x="16" y="16" width="120" height="28" rx="6" fill="#c3e88d" fill-opacity="0.15" stroke="#c3e88d" stroke-width="1"/>
    <text x="76" y="36" fill="#c3e88d" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">ELEVENLABS</text>

    <text x="16" y="80" fill="#dce1fb" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700">Premium Voice</text>
    <text x="16" y="110" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="13">generate_elevenlabs.js</text>

    <rect x="16" y="340" width="288" height="44" rx="8" fill="#c3e88d" fill-opacity="0.1" stroke="#c3e88d" stroke-width="1.5"/>
    <text x="160" y="368" fill="#c3e88d" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">Copy Agent Prompt</text>
  </g>

  <!-- Card 3: Background Generator -->
  <g transform="translate(880, 260)" opacity="0">
    <animateTransform attributeName="transform" type="translate" to="880 260" from="1120 260" begin="1.2s" dur="0.4s" fill="freeze" calcMode="easeOut"/>
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>

    <rect width="320" height="400" rx="12" fill="#0f172a" stroke="#3d494c" stroke-width="1.5"/>
    <rect x="16" y="16" width="100" height="28" rx="6" fill="#c792ea" fill-opacity="0.15" stroke="#c792ea" stroke-width="1"/>
    <text x="66" y="36" fill="#c792ea" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">IDEOGRAM</text>

    <text x="16" y="80" fill="#dce1fb" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700">Neon Background</text>
    <text x="16" y="110" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="13">generate_ideogram.js</text>

    <rect x="16" y="340" width="288" height="44" rx="8" fill="#c792ea" fill-opacity="0.1" stroke="#c792ea" stroke-width="1.5"/>
    <text x="160" y="368" fill="#c792ea" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">Copy Agent Prompt</text>
  </g>

  <!-- Card 4: Smart Trim -->
  <g transform="translate(1240, 260)" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="1480 260" to="1240 260" begin="1.5s" dur="0.4s" fill="freeze" calcMode="easeOut"/>
    <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.3s" fill="freeze"/>

    <rect width="320" height="400" rx="12" fill="#0f172a" stroke="#3d494c" stroke-width="1.5"/>
    <rect x="16" y="16" width="80" height="28" rx="6" fill="#ff5370" fill-opacity="0.15" stroke="#ff5370" stroke-width="1"/>
    <text x="56" y="36" fill="#ff5370" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">FFMPEG</text>

    <text x="16" y="80" fill="#dce1fb" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700">Hero Moment</text>
    <text x="16" y="110" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="13">smart_trim.js</text>

    <rect x="16" y="340" width="288" height="44" rx="8" fill="#ff5370" fill-opacity="0.1" stroke="#ff5370" stroke-width="1.5"/>
    <text x="160" y="368" fill="#ff5370" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">Copy Agent Prompt</text>
  </g>

  <!-- Card 5: Duration Utility -->
  <g transform="translate(1600, 260)" opacity="0">
    <animateTransform attributeName="transform" type="translate" from="1840 260" to="1600 260" begin="1.8s" dur="0.4s" fill="freeze" calcMode="easeOut"/>
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>

    <rect width="320" height="400" rx="12" fill="#0f172a" stroke="#3d494c" stroke-width="1.5"/>
    <rect x="16" y="16" width="70" height="28" rx="6" fill="#869397" fill-opacity="0.15" stroke="#869397" stroke-width="1"/>
    <text x="51" y="36" fill="#869397" font-family="ui-monospace, monospace" font-size="12" font-weight="600" text-anchor="middle">UTIL</text>

    <text x="16" y="80" fill="#dce1fb" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="20" font-weight="700">Duration Probe</text>
    <text x="16" y="110" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="13">get_media_duration.js</text>

    <rect x="16" y="340" width="288" height="44" rx="8" fill="#869397" fill-opacity="0.1" stroke="#869397" stroke-width="1.5"/>
    <text x="160" y="368" fill="#869397" font-family="ui-monospace, monospace" font-size="13" font-weight="600" text-anchor="middle">Copy Agent Prompt</text>
  </g>

  <!-- Fan out animation (cards spread) -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.5s" fill="freeze"/>
    <text x="960" y="760" fill="#8a9aa8" font-family="ui-monospace, monospace" font-size="18" text-anchor="middle">
      5 commands · 4 providers · 0 hallucinations
    </text>
  </g>
</svg>