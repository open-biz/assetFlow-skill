<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="cyan-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0c1324"/>

  <!-- Grid background -->
  <pattern id="end-grid" width="80" height="80" patternUnits="userSpaceOnUse">
    <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1a2744" stroke-width="1" opacity="0.4"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#end-grid)"/>

  <!-- Logo text with stroke animation -->
  <g transform="translate(960, 420)" text-anchor="middle">
    <text x="0" y="0" fill="none" stroke="url(#cyan-gradient)" stroke-width="3" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="160" font-weight="900" letter-spacing="-0.04em" stroke-dasharray="800" stroke-dashoffset="800">
      <animate attributeName="stroke-dashoffset" from="800" to="0" begin="0.3s" dur="1.5s" fill="freeze" calcMode="easeOut"/>
      AssetFlow
    </text>
    <text x="0" y="0" fill="#22d3ee" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="160" font-weight="900" letter-spacing="-0.04em" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="1.5s" dur="0.5s" fill="freeze"/>
      AssetFlow
    </text>
  </g>

  <!-- Tagline -->
  <g transform="translate(960, 520)" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.4s" fill="freeze"/>
    <text x="0" y="0" fill="#8a9aa8" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="500">
      Universal Asset Router for AI Video Agents
    </text>
  </g>

  <!-- Cyan line extending from center -->
  <line x1="960" y1="580" x2="960" y2="580" stroke="#22d3ee" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x1" from="960" to="560" begin="2.2s" dur="0.5s" fill="freeze" calcMode="easeOut"/>
    <animate attributeName="x2" from="960" to="1360" begin="2.2s" dur="0.5s" fill="freeze" calcMode="easeOut"/>
  </line>

  <!-- GitHub URL -->
  <g transform="translate(960, 640)" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.5s" dur="0.3s" fill="freeze"/>
    <text x="0" y="0" fill="#4cd7f6" font-family="ui-monospace, monospace" font-size="18" font-weight="600">
      github.com/open-biz/assetFlow-skill
    </text>
  </g>

  <!-- Small logo mark -->
  <g transform="translate(960, 720)" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
    <text x="0" y="0" fill="#3d494c" font-family="ui-monospace, monospace" font-size="14">
      🌊 Built for the HeyGen Hackathon — Product Track
    </text>
  </g>
</svg>