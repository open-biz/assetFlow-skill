<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="glitch-rgb">
      <feOffset in="SourceGraphic" dx="4" dy="0" result="red">
        <animate attributeName="dx" values="4;-4;2;-2;0" dur="0.3s" repeatCount="indefinite"/>
      </feOffset>
      <feOffset in="SourceGraphic" dx="-4" dy="0" result="blue">
        <animate attributeName="dx" values="-4;4;-2;2;0" dur="0.3s" repeatCount="indefinite"/>
      </feOffset>
      <feBlend in="red" in2="blue" mode="screen" result="blend"/>
      <feBlend in="SourceGraphic" in2="blend" mode="screen"/>
    </filter>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#0a0f1c"/>
  <rect width="100%" height="100%" fill="url(#scanlines)"/>

  <!-- Line 1: HALLUCINATED PATHS -->
  <g transform="translate(960, 420)" text-anchor="middle" filter="url(#glitch-rgb)">
    <text x="0" y="0" fill="#ff4444" font-family="ui-monospace, monospace" font-size="72" font-weight="800" letter-spacing="0.05em">
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.1s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1;0;1" dur="0.2s" begin="0.3s" repeatCount="2"/>
      ❌ HALLUCINATED PATHS
    </text>
  </g>

  <!-- Line 2: WRONG TIMELINE MATH -->
  <g transform="translate(960, 520)" text-anchor="middle" filter="url(#glitch-rgb)">
    <text x="0" y="0" fill="#ff4444" font-family="ui-monospace, monospace" font-size="72" font-weight="800" letter-spacing="0.05em">
      <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.1s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1;0;1" dur="0.2s" begin="0.6s" repeatCount="2"/>
      ❌ WRONG TIMELINE MATH
    </text>
  </g>

  <!-- Line 3: BROKEN RECORDINGS -->
  <g transform="translate(960, 620)" text-anchor="middle" filter="url(#glitch-rgb)">
    <text x="0" y="0" fill="#ff4444" font-family="ui-monospace, monospace" font-size="72" font-weight="800" letter-spacing="0.05em">
      <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.1s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0;1;0;1" dur="0.2s" begin="0.9s" repeatCount="2"/>
      ❌ BROKEN RECORDINGS
    </text>
  </g>

  <!-- Scanline overlay animation -->
  <rect x="0" y="0" width="100%" height="8" fill="#fff" opacity="0.05">
    <animate attributeName="y" from="0" to="1080" dur="2s" repeatCount="indefinite"/>
  </rect>
</svg>