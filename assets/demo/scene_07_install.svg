<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <filter id="heavy-blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="terminal-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24" result="blur"/>
      <feOffset in="blur" dx="0" dy="24" result="offsetBlur"/>
      <feFlood flood-color="#000" flood-opacity="0.8" result="offsetColor"/>
      <feComposite in="offsetColor" in2="offsetBlur" operator="in" result="offsetShadow"/>
      <feMerge>
        <feMergeNode in="offsetShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#191f31" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Blurred background -->
  <rect width="100%" height="100%" fill="#0c1324"/>
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.3" filter="url(#heavy-blur)"/>

  <!-- Terminal Window -->
  <g transform="translate(310, 240)">
    <rect width="1300" height="600" rx="12" fill="#0f172a" fill-opacity="0.95" stroke="#4cd7f6" stroke-width="2" filter="url(#terminal-shadow)"/>

    <!-- Header -->
    <rect width="1300" height="48" rx="12" fill="#151b2d"/>
    <rect x="0" y="36" width="1300" height="12" fill="#151b2d"/>
    <circle cx="20" cy="24" r="6" fill="#ffb4ab"/>
    <circle cx="40" cy="24" r="6" fill="#e1e0ff"/>
    <circle cx="60" cy="24" r="6" fill="#4edea3"/>
    <text x="650" y="28" fill="#869397" font-family="ui-monospace, monospace" font-size="13" text-anchor="middle" font-weight="600">
      &gt;_ assetflow-install — zsh
    </text>

    <!-- Content -->
    <g transform="translate(24, 72)" font-family="ui-monospace, monospace" font-size="20">
      <!-- Command types in -->
      <text x="0" y="0" fill="#4cd7f6" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="0.5s" dur="0.1s" fill="freeze"/>
        $ curl -sSL https://raw.githubusercontent.com/
      </text>
      <text x="16" y="28" fill="#4cd7f6" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.1s" fill="freeze"/>
        open-biz/assetFlow-skill/main/install.sh | bash
      </text>

      <!-- Output -->
      <text x="0" y="80" fill="#8a9aa8">
        <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.1s" fill="freeze"/>
        [AssetFlow] Detecting system...
      </text>
      <text x="0" y="112" fill="#8a9aa8">
        <animate attributeName="opacity" from="0" to="1" begin="2.3s" dur="0.1s" fill="freeze"/>
        [AssetFlow] Cloning repository...
      </text>
      <text x="0" y="144" fill="#4edea3" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.1s" fill="freeze"/>
        ✅ Cloned assetFlow-skill
      </text>
      <text x="0" y="176" fill="#4edea3" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.1s" fill="freeze"/>
        ✅ Installed dependencies
      </text>
      <text x="0" y="208" fill="#4edea3" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.1s" fill="freeze"/>
        ✅ Copied .env.example → .env
      </text>
      <text x="0" y="240" fill="#4edea3" font-weight="700">
        <animate attributeName="opacity" from="0" to="1" begin="3.5s" dur="0.1s" fill="freeze"/>
        ✅ FFmpeg detected in PATH
      </text>
      <text x="0" y="288" fill="#4cd7f6" font-weight="800" font-size="24">
        <animate attributeName="opacity" from="0" to="1" begin="3.9s" dur="0.2s" fill="freeze"/>
        Done in 8.3 seconds.
      </text>

      <!-- CTA -->
      <text x="0" y="360" fill="#8a9aa8">
        <animate attributeName="opacity" from="0" to="1" begin="4.3s" dur="0.3s" fill="freeze"/>
        Next: Edit .env with your API keys, then run `node scripts/list_local_assets.js`
      </text>
    </g>
  </g>

  <!-- Bottom tagline -->
  <g transform="translate(960, 960)" text-anchor="middle" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.5s" dur="0.4s" fill="freeze"/>
    <text x="0" y="0" fill="#4cd7f6" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="24" font-weight="700" letter-spacing="0.05em">
      One command. Ten seconds. Full pipeline.
    </text>
  </g>
</svg>